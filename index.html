<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Bill - આવક જાવક</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 10px; }
       .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 8px; }
       .header { background: #0d9488; color: white; padding: 15px; text-align: center; border-radius: 8px 8px 0 0; }
       .tabs { display: flex; gap: 5px; padding: 10px; background: #f9fafb; }
       .tab { padding: 10px 20px; background: #e5e7eb; border: none; border-radius: 6px; cursor: pointer; }
       .tab.active { background: #0d9488; color: white; }
       .form-box { padding: 15px; border: 1px solid #e5e7eb; margin: 10px; border-radius: 6px; }
       .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 10px; }
       .form-group label { display: block; font-size: 12px; margin-bottom: 4px; color: #374151; }
       .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; }
       .btn-green { background: #16a34a; color: white; padding: 12px; border: none; border-radius: 6px; width: 100%; font-size: 16px; cursor: pointer; }
       .btn-blue { background: #0d9488; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
       .btn-red { background: #dc2626; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }
       .summary { padding: 10px; display: flex; gap: 20px; font-size: 14px; }
       .summary span { color: #16a34a; }
       .summary span.red { color: #dc2626; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #0d9488; color: white; padding: 10px; font-size: 13px; }
        td { padding: 8px; border-bottom: 1px solid #e5e7eb; font-size: 13px; }
    </style>

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
      import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js'

      const firebaseConfig = {
        apiKey: "AIzaSyBWU839rSWrODWDs-WAM5uIR2mJSMorvcg",
        authDomain: "bill-trip.firebaseapp.com",
        projectId: "bill-trip",
        storageBucket: "bill-trip.firebasestorage.app",
        messagingSenderId: "763591165758",
        appId: "1:763591165758:web:16dde9f2ed46886e4f8e6f",
        measurementId: "G-C59KQBQTB9"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      window.db = db;
      window.firestore = { collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, updateDoc };
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🚛 Trip Bill - આવક જાવક</h2>
        </div>
        
        <div class="tabs">
            <button class="tab active">એન્ટ્રી</button>
            <button class="tab">બિલ/રિપોર્ટ</button>
            <button class="tab">બેકઅપ</button>
        </div>

        <div class="form-box">
            <div class="form-row">
                <div class="form-group">
                    <label>Sr No</label>
                    <input type="text" id="srno" value="1">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Vehicle</label>
                    <input type="text" id="vehicle" placeholder="JCB">
                </div>
                <div class="form-group">
                    <label>Trip Details</label>
                    <input type="text" id="tripDetails" placeholder="Trip Details">
                </div>
            </div>
            
            <h4 style="margin:10px 0;color:#0d9488">આવક - Income</h4>
            <div class="form-row">
                <div class="form-group">
                    <input type="number" id="income" placeholder="1000">
                </div>
                <div class="form-group">
                    <input type="number" id="income2" placeholder="8">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <input type="number" id="income3" placeholder="0" style="background:#d1fae5">
                </div>
            </div>

            <h4 style="margin:10px 0;color:#dc2626">જાવક - Expense</h4>
            <div class="form-row">
                <div class="form-group">
                    <input type="text" id="expense1" placeholder="ડીઝલ ₹">
                </div>
                <div class="form-group">
                    <input type="number" id="expenseAmt" placeholder="જાવક Amount ₹">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>જાવક Detail: ટોલ/રોયલ્ટી/મજૂરી</label>
                    <input type="number" id="expenseDetail" value="0">
                </div>
            <div class="form-row">
                <div class="form-group">
                    <select id="account">
                        <option>Account સિલેક્ટ</option>
                        <option>વાકો</option>
                        <option>કેશ</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="text" id="party" placeholder="Party Name">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <input type="text" id="amountDetails" placeholder="Amount જમા Details: ચેક/UTR/તારીખ">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <input type="text" id="remarks" placeholder="Remarks">
                </div>
            </div>
            
            <button class="btn-green" onclick="saveEntry()">એન્ટ્રી સેવ કરો</button>
        </div>

        <div style="padding:10px;display:flex;gap:10px">
            <button class="btn-blue" style="flex:1">Excel Sheet</button>
            <button class="btn-red" style="flex:1">Sr No 1 થી</button>
        </div>

        <div class="summary">
            <span>કુલ આવક: ₹<span id="totalIncome">0</span></span> |
            <span class="red">કુલ જાવક: ₹<span id="totalExpense">0</span></span> |
            <span>ચોખ્ખો નફો: ₹<span id="netProfit">0</span></span>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Sr</th>
                    <th>Date</th>
                    <th>Vehicle</th>
                    <th>Party</th>
                    <th>આવક</th>
                    <th>જાવક</th>
                    <th>નફો</th>
                    <th>Account</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>

<script>
    let entries = [];
    const { db, firestore } = window;
    const { collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, updateDoc } = firestore;

    // Real-time Sync
    onSnapshot(collection(db, "entries"), (snapshot) => {
        entries = [];
        snapshot.forEach(doc => {
            entries.push({ id: doc.id,...doc.data() });
        });
        renderTable();
        updateSummary();
    });

    async function saveEntry() {
        const entry = {
            srno: document.getElementById('srno').value,
            date: document.getElementById('date').value,
            vehicle: document.getElementById('vehicle').value,
            tripDetails: document.getElementById('tripDetails').value,
            income: parseFloat(document.getElementById('income').value) || 0,
            income2: parseFloat(document.getElementById('income2').value) || 0,
            income3: parseFloat(document.getElementById('income3').value) || 0,
            expense1: document.getElementById('expense1').value,
            expenseAmt: parseFloat(document.getElementById('expenseAmt').value) || 0,
            expenseDetail: parseFloat(document.getElementById('expenseDetail').value) || 0,
            account: document.getElementById('account').value,
            party: document.getElementById('party').value,
            amountDetails: document.getElementById('amountDetails').value,
            remarks: document.getElementById('remarks').value,
            createdAt: Date.now()
        };

        await addDoc(collection(db, "entries"), entry);
        clearForm();
    }

    async function deleteEntry(id) {
        if (confirm('ડિલીટ કરવી છે?')) {
            await deleteDoc(doc(db, "entries", id));
        }
    }

    function clearForm() {
        document.getElementById('date').value = '';
        document.getElementById('vehicle').value = '';
        document.getElementById('tripDetails').value = '';
        document.getElementById('income').value = '';
        document.getElementById('income2').value = '';
        document.getElementById('income3').value = '0';
        document.getElementById('expense1').value = '';
        document.getElementById('expenseAmt').value = '';
        document.getElementById('expenseDetail').value = '0';
        document.getElementById('party').value = '';
        document.getElementById('amountDetails').value = '';
        document.getElementById('remarks').value = '';
    }

    function renderTable() {
        const tbody = document.getElementById('dataTable');
        tbody.innerHTML = '';

        entries.sort((a,b) => b.createdAt - a.createdAt).forEach(e => {
            const totalIncome = e.income + e.income2 + e.income3;
            const totalExpense = e.expenseAmt + e.expenseDetail;
            const profit = totalIncome - totalExpense;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${e.srno}</td>
                <td>${e.date}</td>
                <td>${e.vehicle}</td>
                <td>${e.party}</td>
                <td>₹${totalIncome}</td>
                <td>₹${totalExpense}</td>
                <td>₹${profit}</td>
                <td>${e.account}</td>
                <td><button onclick="deleteEntry('${e.id}')" style="background:#dc2626;color:white;border:none;padding:4px 8px;border-radius:4px;cursor:pointer">🗑️</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateSummary() {
        let totalInc = 0, totalExp = 0;
        entries.forEach(e => {
            totalInc += (e.income + e.income2 + e.income3);
            totalExp += (e.expenseAmt + e.expenseDetail);
        });
        document.getElementById('totalIncome').textContent = totalInc;
        document.getElementById('totalExpense').textContent = totalExp;
        document.getElementById('netProfit').textContent = totalInc - totalExp;
    }
</script>
</body>
</html>
